add_newline = false
palette = "neon_cyberpunk"

# Left side: fast + minimal.
format = """$directory$character"""

# Right side: developer context only (kept intentionally small for speed).
right_format = """$git_branch$git_status$nodejs$docker_context"""

command_timeout = 800

[character]
vicmd_symbol = "[N] >>>"
success_symbol = '[➜](bold fg:cyan)'
error_symbol = '[✖](bold fg:pink)'

[directory]
style = "fg:cyan"
format = "[$path]($style) "
truncation_length = 4

[directory.substitutions]
'~/tests/starship-custom' = 'work-project'

[git_branch]
symbol = " "
style = "fg:purple"
format = "[$symbol$branch(:$remote_branch)]($style)"

[git_status]
style = "fg:pink"
format = "([$all_status$ahead_behind]($style))"

[nodejs]
symbol = " "
style = "fg:green"
format = "[$symbol$version]($style) "

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = true

[golang]
format = '[ ](bold cyan)'
disabled = true

[kubernetes]
symbol = '☸ '
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  { context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer", style = "green", context_alias = "omerxx", symbol = " " },
]

[docker_context]
disabled = false
symbol = " "
style = "fg:blue"
format = "[$symbol$context]($style) "

[palettes.neon_cyberpunk]
purple = "#a78bfa"
cyan = "#22d3ee"
pink = "#fb7185"
blue = "#60a5fa"
green = "#34d399"
yellow = "#fbbf24"
text = "#e9d5ff"
background = "#070612"
