add_newline = false
command_timeout = 500
palette = "soft_sakura_dev"

# Two-line prompt:
# - line 1: context (path + git + runtime)
# - line 2: minimal input marker
format = """
$directory$git_branch$git_status$fill$nodejs$docker_context
$character
"""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold mauve)"
error_symbol = "[❯](bold rose)"
vicmd_symbol = "[❮](bold lavender)"

[directory]
style = "bold text"
format = "[$path]($style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "rose"

[directory.substitutions]
"~/.config" = "󱁿 cfg"
"~/dotfiles" = "󰚩 dot"
"~/projects" = "󰲋 proj"

[git_branch]
symbol = " "
style = "lavender"
format = "[$symbol$branch]($style) "

[git_status]
style = "peach"
format = "[$all_status$ahead_behind]($style) "
conflicted = "!"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "~${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "x${count}"

[nodejs]
symbol = " "
style = "mint"
format = "[$symbol$version]($style) "
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "json"]
detect_files = ["package.json", ".node-version", ".nvmrc"]

[docker_context]
symbol = " "
style = "sky"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml"]

[cmd_duration]
disabled = false
min_time = 1500
style = "muted"
format = "[took $duration]($style) "

[palettes.soft_sakura_dev]
text = "#d9e0ee"
muted = "#a6adc8"
rose = "#f38ba8"
mauve = "#cba6f7"
lavender = "#b4befe"
sky = "#89dceb"
mint = "#a6e3a1"
peach = "#fab387"
