add_newline = false
command_timeout = 500
palette = "lucy_edgerunner"

# Lucy Kushinada · Cyberpunk Edgerunners prompt
# Line 1: os · path · git · langs  ──────  runtimes · duration · time
# Line 2: ❥ (input marker)
format = """
$os$directory$git_branch$git_status$python$golang$rust$fill$nodejs$docker_context$cmd_duration$time
$character
"""

# ── Core ──────────────────────────────────────────────────────────────────────

[fill]
symbol = "·"
style = "muted"

[character]
success_symbol = "[λ](bold sakura)"
error_symbol   = "[λ](bold rose)"
vicmd_symbol   = "[❮](bold cyan)"

# ── OS badge ─────────────────────────────────────────────────────────────────

[os]
disabled = false
style = "lavender"
format = "[$symbol]($style)"

[os.symbols]
Linux   = "󰌽 "
Manjaro = "󱘊 "
Arch    = "󰣇 "
Macos   = "󰀵 "
Windows = "󰍲 "

# ── Directory ─────────────────────────────────────────────────────────────────

[directory]
style = "bold text"
format = "[$path]($style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "rose"

[directory.substitutions]
"~/.config"  = "󱁿 cfg"
"~/dotfiles" = "󰚩 dot"
"~/projects" = "󰲋 proj"
"~/Desktop"  = "󰇄 desk"

# ── Git ───────────────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style = "lavender"
format = "[$symbol$branch]($style) "

[git_status]
style = "peach"
format = "[$all_status$ahead_behind]($style) "
conflicted = "!"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?${count}"
stashed    = "*${count}"
modified   = "~${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✗${count}"

# ── Languages (right side of fill) ───────────────────────────────────────────

[nodejs]
symbol = " "
style = "mint"
format = "[$symbol$version]($style) "
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "json"]
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
symbol = " "
style = "gold"
format = "[$symbol$version]($style) "
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version"]

[golang]
symbol = " "
style = "cyan"
format = "[$symbol$version]($style) "
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

[rust]
symbol = "󱘗 "
style = "rose"
format = "[$symbol$version]($style) "
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

[docker_context]
symbol = " "
style = "cyan"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml"]

# ── Meta ──────────────────────────────────────────────────────────────────────

[cmd_duration]
disabled = false
min_time = 1000
style = "muted"
format = "[⧖ $duration]($style) "

[time]
disabled = false
style = "gold"
format = "[$time]($style)"
time_format = "%H:%M"

# ── Palette — Lucy Edgerunner+ ────────────────────────────────────────────────

[palettes.lucy_edgerunner]
text     = "#f0e6ff"
muted    = "#c4b0d8"
sakura   = "#ff6bba"
rose     = "#ff4d8d"
lavender = "#c8a5ff"
cyan     = "#00e5ff"
mint     = "#9dffcc"
gold     = "#ffd97d"
peach    = "#ffb3a0"
