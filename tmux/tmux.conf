## Lucy-inspired cyberpunk tmux config
## Cute, girly, cozy neon pastel base + electric cyan/magenta accents.

# ---- Terminal / performance / UX ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g update-environment "TERM COLORTERM"

set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 200000
set -g aggressive-resize on

# Ensure `#{window_name}` is populated (your screenshot shows window label like “Top”).
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g set-clipboard on
set -g focus-events on

## Keep UI quiet and smooth.
set -g visual-activity off
set -g visual-silence on

## ---- Prefix & core bindings ----
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux: reloaded"

# ---- Vim-style pane movement & resizing ----
setw -g mode-keys vi

# C-h/j/k/l: navigate panes AND nvim splits seamlessly (vim-tmux-navigator).
# prefix + H/J/K/L: resize panes.
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# prefix + C-l: clear terminal screen (C-l is claimed by vim-tmux-navigator).
bind C-l send-keys 'C-l'

# ---- Splits (developer-friendly) ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind x kill-pane
bind c new-window -c "#{pane_current_path}"

# Copy mode (vi)
bind-key [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---- Vibe coding layouts ----

# v: open a 30% terminal strip on the right of the current window.
# Use this to run tests / CLI while nvim occupies the main pane.
bind v split-window -h -p 30 -c "#{pane_current_path}"

# e: new window pre-wired for editing — nvim on left (70%), terminal on right (30%).
bind e new-window -c "#{pane_current_path}" \;\
  send-keys "nvim ." Enter \;\
  split-window -h -p 30 -c "#{pane_current_path}" \;\
  select-pane -L

# ---- Developer popups ----

# g: lazygit floating popup.
bind -r g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E lazygit

# y: Claude Code — dedicated session per directory, opened in an overlay popup.
# Session name is stable (md5 of path) so re-opening attaches to the same session.
bind -r y run-shell '\
  DIR="#{pane_current_path}"; \
  SESSION="claude-$(printf "%s" "$DIR" | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null \
    || tmux new-session -d -s "$SESSION" -c "$DIR" "claude"; \
  tmux display-popup -w 90% -h 90% -E "tmux attach-session -t $SESSION"'

# Y: Claude Code as a persistent side pane (30% right split, stays in window).
bind Y split-window -h -p 30 -c "#{pane_current_path}" "claude"

# ---- TPM + Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Seamless C-h/j/k/l navigation between nvim splits and tmux panes.
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-menus (matches your “Main menu / Handling Pane / Handling Window …” screenshot)
set -g @plugin 'jaclu/tmux-menus'

# Session menu / popups (Lucy HUD menu)
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

## Theme plugin (customized to your aesthetic).
## If the theme repo name differs on your machine, install it via TPM and update this line.
set -g @plugin 'omerxx/catppuccin-tmux'

## floax (floating panes)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#ff6bba'
set -g @floax-text-color '#00e5ff'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

## sessionx (main menu / session UI)
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '#{HOME}/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Sessionx (fzf-tmux popup) styling + preview defaults.
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
# fzf ANSI 256 indexes for neon-ish cyberpunk colors.
set -g @sessionx-additional-options "--color pointer:220,spinner:201,marker:46"

## Session persistence.
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'

# ---- Status Bar (Lucy neon + elegant cute style) ----
set -g status on
set -g status-position bottom
# Balance responsiveness and CPU usage.
set -g status-interval 5
set -g status-justify right

# Global surfaces
set -g status-bg "#11111e"
set -g status-style "fg=#c4b0d8,bg=#11111e"

# Messages / mode UI
set -g mode-style "fg=#f0e6ff,bg=#1a1a2e"
set -g message-style "fg=#f0e6ff,bg=#1a1a2e"
set -g message-command-style "fg=#f0e6ff,bg=#1a1a2e"

# Pane borders
set -g pane-border-style "fg=#c8a5ff,bg=#0a0a14"
set -g pane-active-border-style "fg=#ff6bba,bg=#0a0a14"

# Widths
set -g status-left-length 60
set -g status-right-length 220

# Keep status segment styling explicit in the format strings
set -g status-left-style NONE
set -g status-right-style NONE

# Left: Lucy identity (coder-girl cute)
set -g status-left '#[fg=#0a0a14,bg=#ff6bba,bold] ✦ lucy ♡ #[default]'

# Window list (inactive / active)
setw -g window-status-separator ""
setw -g window-status-activity-style "bold,fg=#ffd97d,bg=#11111e"
setw -g window-status-style "NONE,fg=#c8a5ff,bg=#11111e"

# Inactive windows: hide (keep only the active one, like the screenshot).
setw -g window-status-format ''

# Active window label (single, like your screenshot):
# - `#{window_index}`: tmux window number
# - `#{pane_index}-#{window_panes-1}`: pane range inside the window
# - `#{window_name}`: auto-rename output (often command name like “Top”)
setw -g window-status-current-format '#[fg=#11111e,bg=#ffd97d,bold]⟡ #{window_index},#{pane_index}-#{e|-:#{window_panes},1} #{pane_current_command:t} #[default]'

# Right: developer context (dir + command) + date/time
# Use plain `#{pane_current_path}` (no `:t`) to avoid empty output in some environments.
set -g status-right '#[fg=#0a0a14,bg=#00e5ff,bold] #{=/40:pane_current_path} #[default]#[fg=#00e5ff] · #[default]#[fg=#0a0a14,bg=#ff6bba,bold] #{pane_current_command} #[default]#[fg=#ff6bba] · #[default]#[fg=#0a0a14,bg=#c8a5ff,bold] #{strftime:%m-%d %H:%M} #[default]'

# ---- (Optional) Mouse scroll wheel passthrough hints ----
set -g status-keys vi

# ---- tmux-menus styling (matches screenshot #2) ----
# tmux-menus uses `display-menu`, so these options affect the popup menu.
set -g @menus_location_x 'C'
set -g @menus_location_y 'S'
set -g @menus_border_type 'rounded'
set -g @menus_format_title "'#[fg=#c8a5ff,align=centre] Main menu '"
set -g @menus_simple_style 'bg=#0a0a14'
set -g @menus_simple_style_border 'fg=#00e5ff,bg=default'
set -g @menus_simple_style_selected 'fg=#0a0a14,bg=#ffd97d'
set -g @menus_nav_next '#[fg=#00e5ff]-->'
set -g @menus_nav_prev '#[fg=#c8a5ff]<--'
set -g @menus_nav_home '#[fg=#ff6bba]<=='
