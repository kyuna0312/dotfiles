## Lucy-inspired cyberpunk tmux config
## Cute, girly, cozy neon pastel base + electric cyan/magenta accents.

# ---- Terminal / performance / UX ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g update-environment "TERM COLORTERM"

set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 200000
set -g aggressive-resize on

set -g set-clipboard on
set -g focus-events on

## Keep UI quiet and smooth.
set -g visual-activity off
set -g visual-silence on

## ---- Prefix & core bindings ----
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux: reloaded"

# ---- Vim-style pane movement & resizing ----
setw -g mode-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ---- Splits (developer-friendly) ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind x kill-pane
bind c new-window -c "#{pane_current_path}"

# Copy mode (vi)
bind-key [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---- TPM + Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-menus (matches your “Main menu / Handling Pane / Handling Window …” screenshot)
set -g @plugin 'jaclu/tmux-menus'

# Session menu / popups (Lucy HUD menu)
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

## Theme plugin (customized to your aesthetic).
## If the theme repo name differs on your machine, install it via TPM and update this line.
set -g @plugin 'omerxx/catppuccin-tmux'

## floax (floating panes)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'cyan'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

## sessionx (main menu / session UI)
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '#{HOME}/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Sessionx (fzf-tmux popup) styling + preview defaults.
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
# fzf ANSI 256 indexes for neon-ish cyberpunk colors.
set -g @sessionx-additional-options "--color pointer:220,spinner:201,marker:46"

## Session persistence.
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'

# ---- Status Bar (Lucy neon + powerline style) ----
set -g status on
set -g status-position bottom
set -g status-interval 60
set -g status-justify left

# Global surfaces
set -g status-bg "#0b0b10"
set -g status-style "fg=#2bd3ea,bg=#0b0b10"

# Messages / mode UI
set -g mode-style "fg=#ad5ded,bg=#0b0b10"
set -g message-style "fg=#eee8d5,bg=#073642"
set -g message-command-style "fg=#eee8d5,bg=#073642"

# Pane borders
set -g pane-border-style "fg=#073642,bg=#0b0b10"
set -g pane-active-border-style "fg=#ff4fd8,bg=#0b0b10"

# Widths
set -g status-left-length 100
set -g status-right-length 110

# Keep status segment styling explicit in the format strings
set -g status-left-style NONE
set -g status-right-style NONE

# Left: Lucy + session name
set -g status-left '#[fg=#0b0b10,bg=#2bd3ea,bold]   ♥ lucy kushinada #[fg=#ffd166,bg=#0b0b10,bold] #{session_name} #[default]'

# Window list (inactive / active)
setw -g window-status-separator ""
setw -g window-status-activity-style "underscore,fg=#ffd166,bg=#0b0b10"
setw -g window-status-style "NONE,fg=#ad5ded,bg=#0b0b10"
setw -g window-status-format '#[fg=#ad5ded,bg=#0b0b10] #{window_index} #[fg=#2bd3ea,bg=#0b0b10] #{b:pane_current_path:t} #[default]'
setw -g window-status-current-format '#[fg=#0b0b10,bg=#2bd3ea] #{window_index} #[fg=#0b0b10,bg=#ffd166,bold] #{b:pane_current_path:t} #[default]'

# Right: name + host + time (no battery script = faster)
set -g status-right '#[fg=#2bd3ea,bg=#0b0b10]kyuna0312 #[fg=#ad5ded,bg=#0b0b10]#{hostname} #[fg=#b665f0,bg=#0b0b10] #{strftime:%H:%M} #[default]'

# ---- (Optional) Mouse scroll wheel passthrough hints ----
set -g status-keys vi

# ---- tmux-menus styling (matches screenshot #2) ----
# tmux-menus uses `display-menu`, so these options affect the popup menu.
set -g @menus_location_x 'C'
set -g @menus_location_y 'S'
set -g @menus_border_type 'rounded'
set -g @menus_format_title "'#[fg=#ad5ded,align=centre] Main menu '"
set -g @menus_simple_style 'bg=#1b1b2e'
set -g @menus_simple_style_border 'fg=#2bd3ea,bg=default'
set -g @menus_simple_style_selected 'fg=#0b0b10,bg=#ffd166'
set -g @menus_nav_next '#[fg=#2bd3ea]-->'
set -g @menus_nav_prev '#[fg=#ad5ded]<--'
set -g @menus_nav_home '#[fg=#ff4fd8]<=='
