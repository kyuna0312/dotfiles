## Lucy-inspired cyberpunk tmux config
## Cute, girly, cozy neon pastel base + electric cyan/magenta accents.

# ---- Terminal / performance / UX ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 200000
set -g aggressive-resize on

set -g set-clipboard on
set -g focus-events on

## Keep UI quiet and smooth.
set -g visual-activity off
set -g visual-silence on

## ---- Prefix & core bindings ----
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux: reloaded"

# ---- Vim-style pane movement & resizing ----
setw -g mode-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ---- Splits (developer-friendly) ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind x kill-pane
bind c new-window -c "#{pane_current_path}"

# Copy mode (vi)
bind [ copy-mode

# ---- TPM + Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

## Theme plugin (customized to your aesthetic).
## If the theme repo name differs on your machine, install it via TPM and update this line.
set -g @plugin 'omerxx/catppuccin-tmux'

## Session persistence.
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'

# ---- Status Bar (Lucy neon + minimal) ----
set -g status-position top
set -g status-interval 30
set -g status-style "fg=cyan,bg=default"
set -g message-style "fg=magenta,bg=default"

set -g status-left-length 60
set -g status-right-length 200

set -g status-left '#[fg=cyan]#[fg=magenta] #S #[fg=cyan]'

# Battery helper:
# - Linux: acpi or upower
# - macOS: pmset
# If nothing is available, it returns an empty string.
set -g status-right "#[fg=magenta]#{hostname} #[fg=cyan]#[fg=pink] #{window_index}:#{window_name} #[fg=cyan] #[fg=magenta]#{strftime:%H:%M} #[fg=pink]🔋#(sh -c 'if command -v acpi >/dev/null 2>&1; then acpi -b 2>/dev/null | head -n1 | sed -n \"s/.*\\([0-9][0-9]*%\\).*/\\1/p\"; elif command -v upower >/dev/null 2>&1; then bat=\$(upower -e 2>/dev/null | grep -i BAT | head -n1); upower -i \"\$bat\" 2>/dev/null | sed -n \"s/.*\\([0-9][0-9]*\\)%/\\1%/p\" | head -n1; elif command -v pmset >/dev/null 2>&1; then pmset -g batt 2>/dev/null | sed -n \"s/.*\\([0-9][0-9]*%\\).*/\\1/p\" | head -n1; else echo \"\"; fi' 2>/dev/null) #[default]"

# ---- (Optional) Mouse scroll wheel passthrough hints ----
set -g status-keys vi
