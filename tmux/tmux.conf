## Lucy-inspired cyberpunk tmux config
## Cute, girly, cozy neon pastel base + electric cyan/magenta accents.

# ---- Terminal / performance / UX ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g update-environment "TERM COLORTERM"

set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 200000
set -g aggressive-resize on

# Ensure `#{window_name}` is populated (your screenshot shows window label like “Top”).
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g set-clipboard on
set -g focus-events on

## Keep UI quiet and smooth.
set -g visual-activity off
set -g visual-silence on

## ---- Prefix & core bindings ----
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux: reloaded"

# ---- Vim-style pane movement & resizing ----
setw -g mode-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ---- Splits (developer-friendly) ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind x kill-pane
bind c new-window -c "#{pane_current_path}"

# Copy mode (vi)
bind-key [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---- Developer popups (Lucy cyberpunk) ----
# LazyGit: open in a popup, using the current pane directory.
bind -r g display-popup -d "#{pane_current_path}" -w80% -h80% -E lazygit

# Claude Code: dedicated tmux session per directory, then attach in a popup.
# Session name uses md5 of the directory to stay deterministic and avoid weird chars.
bind -r y run-shell 'DIR="#{pane_current_path}"; SESSION="claude-$(printf "%s" "$DIR" | md5sum | cut -c1-8)"; tmux has-session -t "$SESSION" 2>/dev/null || tmux new-session -d -s "$SESSION" -c "$DIR" "claude"; tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# ---- TPM + Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-menus (matches your “Main menu / Handling Pane / Handling Window …” screenshot)
set -g @plugin 'jaclu/tmux-menus'

# Session menu / popups (Lucy HUD menu)
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

## Theme plugin (customized to your aesthetic).
## If the theme repo name differs on your machine, install it via TPM and update this line.
set -g @plugin 'omerxx/catppuccin-tmux'

## floax (floating panes)
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#fb7185'
set -g @floax-text-color '#22d3ee'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

## sessionx (main menu / session UI)
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '#{HOME}/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Sessionx (fzf-tmux popup) styling + preview defaults.
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
# fzf ANSI 256 indexes for neon-ish cyberpunk colors.
set -g @sessionx-additional-options "--color pointer:220,spinner:201,marker:46"

## Session persistence.
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'

# ---- Status Bar (Lucy neon + elegant cute style) ----
set -g status on
set -g status-position bottom
# Balance responsiveness and CPU usage.
set -g status-interval 5
set -g status-justify right

# Global surfaces
set -g status-bg "#2b2b33"
set -g status-style "fg=#93a1a1,bg=#2b2b33"

# Messages / mode UI
set -g mode-style "fg=#e9d5ff,bg=#161327"
set -g message-style "fg=#e9d5ff,bg=#161327"
set -g message-command-style "fg=#e9d5ff,bg=#161327"

# Pane borders
set -g pane-border-style "fg=#a78bfa,bg=#070612"
set -g pane-active-border-style "fg=#fb7185,bg=#070612"

# Widths
set -g status-left-length 60
set -g status-right-length 220

# Keep status segment styling explicit in the format strings
set -g status-left-style NONE
set -g status-right-style NONE

# Left: Lucy identity (coder-girl cute)
set -g status-left '#[fg=#fb7185,bg=#2b2b33,bold]♥ lucy kushinada#[default]'

# Window list (inactive / active)
setw -g window-status-separator ""
setw -g window-status-activity-style "bold,fg=#fbbf24,bg=#2b2b33"
setw -g window-status-style "NONE,fg=#a78bfa,bg=#2b2b33"

# Inactive windows: hide (keep only the active one, like the screenshot).
setw -g window-status-format ''

# Active window label (single, like your screenshot):
# - `#{window_index}`: tmux window number
# - `#{pane_index}-#{window_panes-1}`: pane range inside the window
# - `#{window_name}`: auto-rename output (often command name like “Top”)
setw -g window-status-current-format '#[fg=#2b2b33,bg=#fbbf24,bold]⟡ #{window_index},#{pane_index}-#{e|-:#{window_panes},1} #{pane_current_command:t} #[default]'

# Right: developer context (dir + command) + date/time
set -g status-right '#[fg=#22d3ee,bg=#2b2b33]#{pane_current_path:t} #[fg=#fbbf24,bg=#2b2b33]· #[fg=#93a1a1,bg=#2b2b33]#{pane_current_command:t} #[fg=#fb7185,bg=#2b2b33]· #{strftime:%m-%d %H:%M} #[default]'

# ---- (Optional) Mouse scroll wheel passthrough hints ----
set -g status-keys vi

# ---- tmux-menus styling (matches screenshot #2) ----
# tmux-menus uses `display-menu`, so these options affect the popup menu.
set -g @menus_location_x 'C'
set -g @menus_location_y 'S'
set -g @menus_border_type 'rounded'
set -g @menus_format_title "'#[fg=#a78bfa,align=centre] Main menu '"
set -g @menus_simple_style 'bg=#070612'
set -g @menus_simple_style_border 'fg=#22d3ee,bg=default'
set -g @menus_simple_style_selected 'fg=#070612,bg=#fbbf24'
set -g @menus_nav_next '#[fg=#22d3ee]-->'
set -g @menus_nav_prev '#[fg=#a78bfa]<--'
set -g @menus_nav_home '#[fg=#fb7185]<=='
