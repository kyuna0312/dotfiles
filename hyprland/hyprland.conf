# hyprland/hyprland.conf
# Catppuccin Mocha themed Hyprland config

################
### MONITORS ###
################
monitor=,preferred,auto,1

###################
### SOURCE FILES ###
###################
source = ~/.config/hypr/keybinds.conf

# ── NVIDIA (Intel+NVIDIA Prime hybrid) ──────────────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
cursor {
    no_hardware_cursors = true
}

#################
### AUTOSTART ###
#################
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(ff6bbaff) rgba(00e5ffff) 45deg
    col.inactive_border = rgba(c8a5ff22)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 14
    active_opacity = 1.0
    inactive_opacity = 0.93
    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.17
    }
    shadow {
        enabled = true
        range = 15
        color = rgba(ff6bba55)
        color_inactive = rgba(c8a5ff22)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows,     1, 7,  myBezier
    animation = windowsOut,  1, 7,  default, popin 80%
    animation = border,      1, 10, default
    animation = fade,        1, 7,  default
    animation = workspaces,  1, 6,  default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    vfr = true
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(File Operation Progress)(.*)$
windowrulev2 = noblur, class:^(chromium|brave|firefox)$
windowrulev2 = noanim, class:^(wofi)$
