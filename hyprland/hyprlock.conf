# hyprland/hyprlock.conf
# Lucy Edgerunner palette: #ff6bba pink, #00e5ff cyan, #c8a5ff lavender

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 5
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper.jpg
    blur_size = 6
    blur_passes = 2
    brightness = 0.6
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(c8a5ffff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(00e5ffcc)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgba(ff6bbaff)
    inner_color = rgba(1e1e2ecc)
    font_color = rgba(c8a5ffff)
    fade_on_empty = true
    placeholder_text = <span foreground="##c8a5ff">  password</span>
    check_color = rgba(00e5ffff)
    fail_color = rgba(ff6b6bff)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgba(ffba6bff)
    position = 0, -140
    halign = center
    valign = center
}
